<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tu Renault Con Santiago</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600;700;800;900&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #111113;
      --surface: #1C1C1F;
      --surface2: #252528;
      --yellow: #FFD100;
      --white: #FFFFFF;
      --gray: #8E8E93;
      --gray2: #AEAEB2;
      --green: #25D366;
      --r: 12px;
      --display: 'Barlow Condensed', sans-serif;
      --body: 'Inter', sans-serif;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:var(--body);min-height:100vh;}

    /* ─── HERO ─── */
    .hero{
      background:linear-gradient(160deg,#111113 0%,#18180f 60%,#111113 100%);
      border-bottom:2px solid var(--yellow);
      padding:56px 24px 44px;
      text-align:center;
      position:relative;
      overflow:hidden;
    }
    .hero::before{
      content:'';position:absolute;top:-40%;left:50%;transform:translateX(-50%);
      width:700px;height:320px;
      background:radial-gradient(ellipse,rgba(255,209,0,.07) 0%,transparent 70%);
      pointer-events:none;
    }
    .hero-badge{
      display:inline-block;background:var(--yellow);color:#000;
      font-family:var(--display);font-size:11px;font-weight:700;
      letter-spacing:2px;text-transform:uppercase;
      padding:6px 14px;border-radius:4px;margin-bottom:20px;
    }
    .hero h1{
      font-family:var(--display);font-size:clamp(52px,12vw,96px);
      font-weight:900;line-height:.88;text-transform:uppercase;letter-spacing:-2px;
    }
    .hero h1 span{color:var(--yellow);}
    .hero-sub{font-size:13px;color:var(--gray);margin-top:16px;letter-spacing:.4px;}
    .hero-stats{display:flex;justify-content:center;gap:48px;margin-top:36px;flex-wrap:wrap;}
    .stat-num{font-family:var(--display);font-size:40px;font-weight:800;color:var(--yellow);line-height:1;}
    .stat-label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1.2px;margin-top:4px;}

    /* ─── FILTERS ─── */
    .filters-wrap{
      position:sticky;top:0;z-index:100;
      background:rgba(17,17,19,.96);backdrop-filter:blur(14px);
      border-bottom:1px solid rgba(255,255,255,.06);
    }
    .filters{
      display:flex;gap:6px;overflow-x:auto;padding:12px 24px;
      scrollbar-width:none;max-width:1200px;margin:0 auto;
    }
    .filters::-webkit-scrollbar{display:none;}
    .filter-btn{
      background:transparent;border:1px solid rgba(255,255,255,.1);
      color:var(--gray);font-family:var(--body);font-size:12px;font-weight:500;
      padding:7px 15px;border-radius:20px;cursor:pointer;white-space:nowrap;
      transition:all .2s;
    }
    .filter-btn:hover{border-color:rgba(255,209,0,.35);color:var(--white);}
    .filter-btn.active{background:var(--yellow);border-color:var(--yellow);color:#000;font-weight:600;}

    /* ─── MAIN ─── */
    .main{max-width:1200px;margin:0 auto;padding:32px 24px 140px;}
    .section-label{
      font-size:10px;font-weight:600;letter-spacing:2px;text-transform:uppercase;
      color:var(--gray);margin-bottom:20px;
    }

    /* ─── GRID ─── */
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(310px,1fr));gap:16px;}

    /* ─── CARD ─── */
    .card{
      background:var(--surface);border-radius:var(--r);
      border:1px solid rgba(255,255,255,.06);
      overflow:hidden;cursor:pointer;
      transition:border-color .2s,transform .2s,box-shadow .2s;
      position:relative;
    }
    .card:hover{border-color:rgba(255,209,0,.22);transform:translateY(-2px);}
    .card.open{border-color:var(--yellow);box-shadow:0 0 0 1px var(--yellow);}

    /* ─── IMAGE AREA ─── */
    .card-img{
      width:100%;height:200px;position:relative;overflow:hidden;
      display:flex;align-items:center;justify-content:center;
    }
    .card-img-bg{
      position:absolute;inset:0;
      display:flex;align-items:center;justify-content:center;
    }
    .card-img-bg span{
      font-family:var(--display);font-size:72px;font-weight:900;
      letter-spacing:-3px;text-transform:uppercase;
      opacity:.07;color:var(--white);user-select:none;
    }
    .card-img img{
      position:absolute;inset:0;width:100%;height:100%;
      object-fit:cover;transition:opacity .3s;
    }
    .card-img img.img-ext{ opacity:1; }
    .card-img img.img-int{ opacity:0; }
    .card-img.show-int img.img-ext{ opacity:0; }
    .card-img.show-int img.img-int{ opacity:1; }

    .img-placeholder{
      position:absolute;bottom:10px;left:50%;transform:translateX(-50%);
      font-size:9px;letter-spacing:1px;text-transform:uppercase;
      color:rgba(255,255,255,.2);white-space:nowrap;
    }
    .year-tag{
      position:absolute;top:10px;right:10px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.1);
      color:var(--gray2);font-size:10px;font-weight:600;letter-spacing:1px;
      padding:3px 8px;border-radius:4px;
    }

    /* ─── IMG TOGGLE ─── */
    .img-toggle{
      position:absolute;bottom:10px;right:10px;
      display:flex;gap:4px;z-index:5;
    }
    .img-toggle button{
      background:rgba(0,0,0,.6);backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.15);border-radius:4px;
      color:var(--gray2);font-size:9px;font-weight:600;letter-spacing:.5px;
      padding:3px 7px;cursor:pointer;transition:all .15s;
    }
    .img-toggle button.active{background:var(--yellow);border-color:var(--yellow);color:#000;}
    .img-toggle button:hover:not(.active){border-color:rgba(255,255,255,.4);color:var(--white);}

    /* compare checkbox */
    .cmp-wrap{position:absolute;top:10px;left:10px;z-index:5;}
    .cmp-wrap input{display:none;}
    .cmp-wrap label{
      display:flex;align-items:center;gap:5px;
      background:rgba(0,0,0,.55);backdrop-filter:blur(6px);
      border:1px solid rgba(255,255,255,.15);border-radius:20px;
      padding:3px 9px 3px 5px;cursor:pointer;
      font-size:10px;font-weight:500;color:var(--white);
      transition:background .15s,border-color .15s;user-select:none;
    }
    .cmp-wrap input:checked+label{background:var(--yellow);border-color:var(--yellow);color:#000;}
    .cmp-dot{
      width:13px;height:13px;border-radius:50%;border:1.5px solid currentColor;
      display:flex;align-items:center;justify-content:center;font-size:8px;
    }
    .cmp-wrap input:checked+label .cmp-dot::after{content:'✓';}

    /* card body */
    .card-body{padding:16px;}
    .card-cat{
      font-size:10px;font-weight:600;letter-spacing:1.5px;
      text-transform:uppercase;color:var(--yellow);margin-bottom:4px;
    }
    .card-name{
      font-family:var(--display);font-size:25px;font-weight:800;
      text-transform:uppercase;line-height:1.1;letter-spacing:-.3px;
    }
    .card-price-row{margin-top:12px;display:flex;align-items:baseline;gap:6px;}
    .price-lbl{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:1px;}
    .price-val{font-family:var(--display);font-size:22px;font-weight:700;}
    .card-cuota{margin-top:6px;font-size:12px;color:var(--gray);}
    .card-cuota strong{color:var(--yellow);}
    .card-hint{
      margin-top:14px;font-size:11px;color:var(--gray);
      display:flex;align-items:center;gap:5px;
    }
    .card-hint .arr{display:inline-block;transition:transform .25s;font-size:14px;}
    .card.open .card-hint .arr{transform:rotate(90deg);}

    /* expanded panel */
    .card-expanded{
      max-height:0;overflow:hidden;
      transition:max-height .4s cubic-bezier(.4,0,.2,1);
    }
    .card.open .card-expanded{max-height:1200px;}
    .exp-inner{
      border-top:1px solid rgba(255,255,255,.06);
      padding:20px 16px 20px;
    }
    .exp-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;}
    .exp-sec h4{
      font-size:10px;font-weight:600;letter-spacing:1.5px;
      text-transform:uppercase;color:var(--gray);margin-bottom:10px;
    }
    .spec-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:7px 0;border-bottom:1px solid rgba(255,255,255,.05);
      font-size:12.5px;
    }
    .spec-row:last-child{border-bottom:none;}
    .spec-k{color:var(--gray);}
    .spec-v{color:var(--white);font-weight:500;text-align:right;max-width:60%;}
    .extras{display:flex;flex-wrap:wrap;gap:6px;padding-top:2px;}
    .extra{
      background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.07);
      border-radius:4px;padding:4px 8px;font-size:11px;color:var(--gray2);
    }

    /* pricing box */
    .pricing{background:var(--surface2);border-radius:10px;padding:16px;}
    .p-row{
      display:flex;justify-content:space-between;align-items:center;
      padding:9px 0;border-bottom:1px solid rgba(255,255,255,.05);
    }
    .p-row:last-child{border-bottom:none;}
    .p-row.highlight{padding-top:13px;}
    .p-k{font-size:12px;color:var(--gray);}
    .p-v{font-family:var(--display);font-size:20px;font-weight:700;color:var(--white);}
    .p-v.yellow{color:var(--yellow);}
    .p-v.sm{font-size:13px;color:var(--gray2);}
    .p-note{font-size:10px;color:var(--gray);text-align:center;margin-top:10px;line-height:1.5;}

    /* CTA */
    .cta-area{display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;}
    .btn-wa{
      flex:1;min-width:200px;display:flex;align-items:center;
      justify-content:center;gap:8px;
      background:var(--green);color:#fff;text-decoration:none;
      font-family:var(--body);font-size:13px;font-weight:600;
      padding:12px 18px;border-radius:8px;transition:background .2s;
    }
    .btn-wa:hover{background:#1fb955;}
    .btn-wa svg{width:17px;height:17px;flex-shrink:0;}

    /* ─── COMPARE BAR ─── */
    .cmp-bar{
      position:fixed;bottom:0;left:0;right:0;
      background:var(--surface);border-top:1px solid rgba(255,209,0,.25);
      padding:14px 20px;display:flex;align-items:center;
      justify-content:space-between;gap:12px;z-index:200;
      transform:translateY(100%);transition:transform .3s ease;
    }
    .cmp-bar.show{transform:translateY(0);}
    .cmp-bar-items{display:flex;gap:8px;flex:1;overflow-x:auto;scrollbar-width:none;align-items:center;}
    .cmp-bar-items::-webkit-scrollbar{display:none;}
    .cmp-chip{
      background:var(--surface2);border:1px solid rgba(255,209,0,.2);
      border-radius:8px;padding:5px 10px;font-size:11px;color:var(--white);
      white-space:nowrap;display:flex;align-items:center;gap:6px;
    }
    .cmp-chip button{background:none;border:none;color:var(--gray);cursor:pointer;font-size:13px;line-height:1;padding:0;}
    .cmp-chip button:hover{color:var(--white);}
    .btn-cmp{
      background:var(--yellow);color:#000;border:none;
      font-family:var(--display);font-size:15px;font-weight:700;
      padding:10px 20px;border-radius:8px;cursor:pointer;white-space:nowrap;
    }

    /* ─── COMPARE MODAL ─── */
    .cmp-modal{
      position:fixed;inset:0;z-index:300;
      background:rgba(0,0,0,.88);
      display:none;align-items:flex-end;padding:16px;
    }
    .cmp-modal.open{display:flex;}
    .cmp-inner{
      background:var(--surface);border-radius:16px;
      width:100%;max-height:88vh;overflow-y:auto;
      max-width:960px;margin:0 auto;padding:24px;
    }
    .cmp-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;}
    .cmp-header h3{font-family:var(--display);font-size:26px;font-weight:800;text-transform:uppercase;}
    .btn-close{
      background:var(--surface2);border:none;color:var(--gray);
      width:32px;height:32px;border-radius:50%;cursor:pointer;
      font-size:16px;display:flex;align-items:center;justify-content:center;
    }
    .cmp-table{width:100%;border-collapse:collapse;}
    .cmp-table th{
      font-family:var(--display);font-size:17px;font-weight:700;
      text-align:center;padding:10px 6px;color:var(--yellow);
      border-bottom:1px solid rgba(255,255,255,.08);
    }
    .cmp-table td{
      padding:9px 6px;font-size:12.5px;text-align:center;
      border-bottom:1px solid rgba(255,255,255,.04);color:var(--gray2);
    }
    .cmp-table td:first-child{text-align:left;color:var(--gray);font-size:10px;letter-spacing:.5px;text-transform:uppercase;}
    .cmp-table tr:hover td{background:rgba(255,255,255,.02);}

    /* ─── FLOATING WA ─── */
    .float-wa{
      position:fixed;bottom:24px;right:24px;
      width:52px;height:52px;background:var(--green);border-radius:50%;
      display:flex;align-items:center;justify-content:center;
      box-shadow:0 4px 20px rgba(37,211,102,.38);z-index:150;
      text-decoration:none;transition:transform .2s;
    }
    .float-wa:hover{transform:scale(1.08);}

    @media(max-width:640px){.grid{grid-template-columns:1fr;}.hero-stats{gap:28px;}}
    ::-webkit-scrollbar{width:4px;}
    ::-webkit-scrollbar-track{background:transparent;}
    ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px;}
  </style>
</head>

const $ = id => document.getElementById(id);
const fmt = n => '$' + Math.round(n).toLocaleString('es-CO');
const cuota = v => v.cuotaFija != null ? v.cuotaFija : (v.primeraInversion != null ? (v.precio - v.primeraInversion) / 84 : v.precio / 84);
const total84 = v => (v.primeraInversion != null ? v.primeraInversion : 0) + cuota(v) * 83;
const waLink = (v, num) => {
  const txt = encodeURIComponent(`Hola! Me interesa el *Renault ${v.modelo}* (${v.año}) del Plan Rombo. La cuota de ${fmt(cuota(v))}/mes me parece interesante. ¿Me puedes dar más información?`);
  return `https://wa.me/${num}?text=${txt}`;
};

let currentFilter = 'todos';
let compareList = [];

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  renderGrid();
}

function toggleCard(id) {
  const el = document.getElementById('card-' + id);
  if (!el) return;
  const isOpen = el.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c => c.classList.remove('open'));
  if (!isOpen) el.classList.add('open');
}

function switchImg(id, view, e) {
  e.stopPropagation();
  const imgArea = document.getElementById('imgarea-' + id);
  const btnExt  = document.getElementById('btnext-' + id);
  const btnInt  = document.getElementById('btnint-' + id);
  if (!imgArea) return;
  if (view === 'int') {
    imgArea.classList.add('show-int');
    btnInt.classList.add('active');
    btnExt.classList.remove('active');
  } else {
    imgArea.classList.remove('show-int');
    btnExt.classList.add('active');
    btnInt.classList.remove('active');
  }
}

function toggleCompare(id, e) {
  e.stopPropagation();
  const idx = compareList.indexOf(id);
  if (idx === -1) {
    if (compareList.length >= 3) { alert('Máximo 3 vehículos para comparar.'); return; }
    compareList.push(id);
  } else {
    compareList.splice(idx, 1);
  }
  updateCompareBar();
}

function updateCompareBar() {
  const bar = $('cmpBar');
  const items = $('cmpBarItems');
  if (compareList.length === 0) { bar.classList.remove('show'); return; }
  bar.classList.add('show');
  items.innerHTML = compareList.map(id => {
    const v = VEHICLES.find(x => x.id === id);
    return `<div class="cmp-chip">${v.modelo.split(' ')[0]} ${v.modelo.split(' ')[1]||''}<button onclick="removeCompare(${id})">✕</button></div>`;
  }).join('');
}

function removeCompare(id) {
  compareList = compareList.filter(x => x !== id);
  const cb = document.getElementById('cmp-' + id);
  if (cb) cb.checked = false;
  updateCompareBar();
}

      </div>
    </div>
  </div>`;
}

function renderGrid() {
  const filtered = currentFilter === 'todos' ? VEHICLES : VEHICLES.filter(v => v.cat === currentFilter);
  $('section-label').textContent = `${filtered.length} vehículo${filtered.length!==1?'s':''} disponible${filtered.length!==1?'s':''}`;
  $('grid').innerHTML = filtered.map(cardHTML).join('');
}

renderGrid();
</script>
</body>
</html>
